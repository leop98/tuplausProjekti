<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Tuplaus</title>
</head>
<body>
  <h1>Tuplaus</h1>

  <!-- Pelaajan luominen -->
  <section>
    <h2>Luo pelaaja</h2>
    <input id="playerId" type="text" placeholder="ID">
    <input id="playerName" type="text" placeholder="Nimi">
    <input id="playerBalance" type="number" placeholder="Saldo" value="1000">
    <button onclick="createPlayer()">Luo</button>
  </section>

  <hr>

  <!-- Pelaajan tila -->
  <section id="playerSection" style="display:none">
    <h2>Pelaajan tila</h2>
    <p>ID: <span id="displayId"></span></p>
    <p>Nimi: <span id="displayName"></span></p>
    <p>Saldo: <span id="displayBalance"></span></p>
    <p>Odottava voitto: <span id="displayPending"></span></p>
    <p>Kierros käynnissä: <span id="displayInGame"></span></p>
  </section>

  <hr>

  <!-- Pelaaminen -->
  <section id="playSection" style="display:none">
    <h2>Pelaa</h2>
    <input id="bet" type="number" placeholder="Panos" value="100">
    <button onclick="play('small')">Pieni (1–6)</button>
    <button onclick="play('large')">Suuri (8–13)</button>
  </section>

  <!-- Tuplaus ja kotiutus -->
  <section id="doubleSection" style="display:none">
    <h2>Tuplaa tai kotiuta</h2>
    <button onclick="doDouble('small')">Tuplaa — Pieni</button>
    <button onclick="doDouble('large')">Tuplaa — Suuri</button>
    <button onclick="cashout()">Kotiuta</button>
  </section>

  <hr>

  <!-- Viimeisin tulos -->
  <section id="resultSection" style="display:none">
    <h2>Tulos</h2>
    <p>Kortti: <span id="resultCard"></span></p>
    <p>Voitit: <span id="resultWon"></span></p>
    <p>Odottava voitto: <span id="resultPending"></span></p>
  </section>

  <hr>

  <!-- Historia -->
  <section id="historySection" style="display:none">
    <h2>Historia</h2>
    <button onclick="loadHistory()">Päivitä</button>
    <table border="1" cellpadding="4">
      <thead>
        <tr>
          <th>Aika</th>
          <th>Panos</th>
          <th>Valinta</th>
          <th>Kortti</th>
          <th>Voitto</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </section>

  <!-- Virheet -->
  <p id="errorMsg" style="color:red"></p>

  <script>
    let playerId = null;

    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
    }

    function clearError() {
      document.getElementById('errorMsg').textContent = '';
    }

    function updatePlayerDisplay(player) {
      document.getElementById('displayId').textContent = player.id;
      document.getElementById('displayName').textContent = player.name;
      document.getElementById('displayBalance').textContent = player.balance;
      document.getElementById('displayPending').textContent = player.pendingWin;
      document.getElementById('displayInGame').textContent = player.inGame ? 'Kyllä' : 'Ei';

      document.getElementById('playerSection').style.display = 'block';
      document.getElementById('historySection').style.display = 'block';

      // Näytä oikeat toiminnot tilan mukaan
      document.getElementById('playSection').style.display = player.inGame ? 'none' : 'block';
      document.getElementById('doubleSection').style.display = player.inGame ? 'block' : 'none';
    }

    async function createPlayer() {
      clearError();
      const id = document.getElementById('playerId').value;
      const name = document.getElementById('playerName').value;
      const balance = parseInt(document.getElementById('playerBalance').value);
      const res = await fetch('/players', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, name, balance }),
      });
      const data = await res.json();
      if (!res.ok) { return showError(data.error); }
      playerId = data.id;
      updatePlayerDisplay(data);
    }

    async function play(choice) {
      clearError();
      const bet = parseInt(document.getElementById('bet').value);
      const res = await fetch(`/players/${playerId}/play`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bet, choice }),
      });
      const data = await res.json();
      if (!res.ok) { return showError(data.error); }
      showResult(data);
      refreshPlayer();
    }

    async function doDouble(choice) {
      clearError();
      const res = await fetch(`/players/${playerId}/double`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ choice }),
      });
      const data = await res.json();
      if (!res.ok) { return showError(data.error); }
      showResult(data);
      refreshPlayer();
    }

    async function cashout() {
      clearError();
      const res = await fetch(`/players/${playerId}/cashout`, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) { return showError(data.error); }
      document.getElementById('resultSection').style.display = 'none';
      refreshPlayer();
    }

    async function refreshPlayer() {
      const res = await fetch(`/players/${playerId}`);
      const data = await res.json();
      if (!res.ok) { return showError(data.error); }
      updatePlayerDisplay(data);
    }

    function showResult(data) {
      document.getElementById('resultCard').textContent = data.card;
      document.getElementById('resultWon').textContent = data.won ? 'Kyllä' : 'Ei';
      document.getElementById('resultPending').textContent = data.pendingWin;
      document.getElementById('resultSection').style.display = 'block';
    }

    async function loadHistory() {
      clearError();
      const res = await fetch(`/players/${playerId}/history`);
      const data = await res.json();
      if (!res.ok) { return showError(data.error); }
      const tbody = document.getElementById('historyBody');
      tbody.innerHTML = '';
      for (const e of data.events) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${new Date(e.timestamp).toLocaleString('fi-FI')}</td>
          <td>${e.bet}</td>
          <td>${e.choice === 'small' ? 'Pieni' : 'Suuri'}</td>
          <td>${e.card}</td>
          <td>${e.payout}</td>
        `;
        tbody.appendChild(tr);
      }
    }
  </script>
</body>
</html>
